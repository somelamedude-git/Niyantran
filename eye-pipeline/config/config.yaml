model:
  face_landmarker_path: "face_landmarker.task"
  lstm_weights_path: "models/lstm.pth"

preprocessing:
  size: "224x224"
  fps: 30
  codec: "h264"
  color: "rgb"
  use_gpu: false

emd:
  max_imf: 4

inference:
  device: "cpu"
  threshold: 0.5          

paths:
  data_raw: "data/raw"
  data_processed: "data/processed"
  output: "output"
